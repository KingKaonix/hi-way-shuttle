name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start server and run smoke tests
        run: |
          TELEGRAM_BOT_TOKEN=ci_test node server.js &
          SERVER_PID=$!
          sleep 2
          node test/smoke.js
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null
          exit $EXIT_CODE
