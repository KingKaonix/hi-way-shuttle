name: Build Android APKs

'on':
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app: [rider, driver]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild native Android project
        run: ./node_modules/.bin/expo prebuild --clean --no-install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1
        continue-on-error: true

      - name: Accept Android licenses (retry)
        run: |
          for i in 1 2 3; do
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses < /dev/null && break
            sleep 5
          done

      - name: Install required Android SDK components (retry)
        run: |
          for i in 1 2 3; do
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
              "platforms;android-34" \
              "build-tools;34.0.0" \
              "platform-tools" \
              --sdk_root=$ANDROID_HOME < /dev/null && break
            sleep 5
          done

      - name: Build APK
        run: |
          cd android
          BUILDTYPE=$(echo ${{ github.event.inputs.build_type || 'release' }} | sed 's/^./\u&/')
          ./gradlew "assemble${BUILDTYPE}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hiway-${{ matrix.app }}-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/**/*.apk

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Rider APK
        uses: actions/download-artifact@v4
        with:
          name: hiway-rider-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: apks/

      - name: Download Driver APK
        uses: actions/download-artifact@v4
        with:
          name: hiway-driver-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: apks/

      - name: Generate release tag
        id: tag
        run: |
          echo "version=v$(date +'%Y.%m.%d')-build-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "HiWay ${{ github.event.inputs.build_type || 'release' }} ${{ steps.tag.outputs.version }}"
          body: |
            ## HiWay Rideshare APK Build

            - Build #${{ github.run_number }}
            - Trigger: ${{ github.event_name }}
            - Commit: ${{ github.sha }}

            **Changes in this build:**
            ${{ github.event.head_commit.message || 'See commit for details' }}
          files: apks/**/*.apk
          generate_release_notes: false
