name: Build Android APKs

'on':
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        app: [rider, driver]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prebuild native Android project
        run: ./node_modules/.bin/expo prebuild --clean --no-install

      - name: Patch Kotlin/Compose versions for compat
        run: |
          # 1) Upgrade Kotlin to 1.9.25 (needed by Compose Compiler 1.5.15)
          find android/ -type f \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.properties" \) \
            -exec sed -i 's/1\.9\.24/1.9.25/g' {} +
          echo "kotlinVersion=1.9.25" >> android/gradle.properties
          
          # 2) In case Kotlin replacement isn't picked up, also downgrade Compose Compiler to 1.5.14
          if [ -d "node_modules/expo-modules-core" ]; then
            find node_modules/expo-modules-core -name "*.gradle" -exec sed -i 's/1\.5\.15/1.5.14/g' {} +
          fi
          
          # Show what was changed
          echo "=== Gradle files using Kotlin 1.9.25 ==="
          grep -rn "1\.9\.25" android/ --include="*.gradle" --include="*.properties" | head -10
          echo "=== Gradle files using Compose 1.5.14 ==="
          grep -rn "1\.5\.14\|1\.5\.15" node_modules/expo-modules-core --include="*.gradle" 2>/dev/null | head -5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            --sdk_root=$ANDROID_HOME > /dev/null 2>&1 || true

      - name: Build APK
        run: |
          cd android
          BUILDTYPE=$(echo ${{ github.event.inputs.build_type || 'release' }} | sed 's/^./\u&/')
          ./gradlew "assemble${BUILDTYPE}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hiway-${{ matrix.app }}-${{ github.event.inputs.build_type || 'release' }}
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/**/*.apk
