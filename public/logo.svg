<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="hiway-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9952b"/>
      <stop offset="100%" stop-color="#f0d070"/>
    </linearGradient>
    <linearGradient id="hiway-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="hiway-mark-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- === Icon Mark: Abstract "H" + forward motion === -->

  <!-- Hexagon/rounded hex background -->
  <path d="M32 6L56 18C59.3 19.8 61.3 23.3 61.3 27V53C61.3 56.7 59.3 60.2 56 62L32 74C28.7 75.8 24.6 75.8 21.3 74L-3 62C-6.3 60.2 -8.3 56.7 -8.3 53V27C-8.3 23.3 -6.3 19.8 -3 18L21.3 6C24.6 4.2 28.7 4.2 32 6Z"
        fill="url(#hiway-mark-bg)" stroke="url(#hiway-primary)" stroke-width="1.5"/>

  <!-- H letterform - stylized interlocking lines -->
  <g stroke="url(#hiway-primary)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left stem -->
    <line x1="11" y1="24" x2="11" y2="56"/>
    <!-- Right stem -->
    <line x1="37" y1="24" x2="37" y2="56"/>
    <!-- Crossbar - angled for motion feel -->
    <line x1="11" y1="36" x2="37" y2="36"/>
    <!-- Forward sweep (road => speed) -->
    <path d="M37 40C43 40 46 44 48 48" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- Glow dot -->
  <circle cx="48" cy="48" r="2" fill="url(#hiway-primary)"/>

  <!-- === Wordmark === -->

  <!-- "HiWay" - modern geometric sans -->
  <g transform="translate(72, 28)">
    <!-- H -->
    <path d="M0 0V32M0 16H22M22 0V32" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- i (dot) -->
    <circle cx="32" cy="6" r="3" fill="url(#hiway-primary)"/>
    <!-- i (stem) -->
    <rect x="29" y="14" width="6" height="18" rx="3" fill="#0f172a"/>
    <!-- W -->
    <path d="M44 14L50 32L56 20L62 32L68 14" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- a -->
    <path d="M80 20C80 16 84 14 88 14C92 14 96 16 96 20V32M80 26C80 22 84 20 88 20C92 20 96 22 96 26" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- y -->
    <path d="M104 14V26C104 30 106 34 110 34M104 20L110 32" stroke="#0f172a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "SHUTTLE" sub-label -->
  <g transform="translate(72, 68)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" letter-spacing="4.5" fill="#64748b">
      SHUTTLE
    </text>
  </g>
</svg>
